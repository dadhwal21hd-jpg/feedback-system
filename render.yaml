services:
  - type: web
    name: feedback-system
    env: python
    pythonVersion: 3.11
    buildCommand: >
      pip install --upgrade pip &&
      pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11